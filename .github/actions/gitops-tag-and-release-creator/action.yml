---
name: GitOps Tag and Release Creator
description: >
  Creates a Git tag at the current commit and publishes a GitHub release with
  an auto-generated changelog of commits since the previous tag.
  Validates that the tag does not already exist before creating it.
author: "DevOps Team"

inputs:
  release_version:
    description: "Release version to tag (must follow semver, e.g. v1.2.3)."
    required: false
    default: ""
  github_token:
    description: "GitHub token with permissions to create tags and releases."
    required: false
    default: ""
  environment:
    description: "Target environment for the release (e.g. dev, staging, production)."
    required: false
    default: "dev"

outputs:
  tag_created:
    description: "True when the Git tag was successfully created."
    value: ${{ steps.run.outputs.tag_created }}
  release_created:
    description: "True when the GitHub release was successfully created."
    value: ${{ steps.run.outputs.release_created }}
  release_url:
    description: "URL of the created GitHub release."
    value: ${{ steps.run.outputs.release_url }}

runs:
  using: composite
  steps:
    - id: run
      uses: ./.ci-toolkit/.github/actions/run-script
      with:
        script: gitops/tag-release-creator/tag-and-release-creator.sh
        env_vars: |
          INPUT_RELEASE_VERSION=${{ inputs.release_version }}
          INPUT_ENVIRONMENT=${{ inputs.environment }}
          INPUT_GITHUB_TOKEN=${{ inputs.github_token }}
          GH_TOKEN=${{ inputs.github_token }}
