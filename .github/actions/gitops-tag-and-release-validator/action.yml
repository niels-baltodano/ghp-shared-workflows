---
name: GitOps Tag and Release Validator
description: >
  Validates that the release version follows semver and that neither a matching
  Git tag nor a GitHub release already exist in the repository.
  Exits non-zero when validation fails.
author: "DevOps Team"

inputs:
  release_version:
    description: "Release version to validate (must follow semver, e.g. v1.2.3)."
    required: false
    default: ""

outputs:
  validation_result:
    description: "Semver and existence validation result: passed / failed."
    value: ${{ steps.run.outputs.validation_result }}
  tag_exists:
    description: "True when the tag already exists in the repository."
    value: ${{ steps.run.outputs.tag_exists }}
  release_exists:
    description: "True when a GitHub release already exists for the version."
    value: ${{ steps.run.outputs.release_exists }}

runs:
  using: composite
  steps:
    - id: run
      uses: ./.ci-toolkit/.github/actions/run-script
      with:
        script: gitops/tag-release-validator/tag-and-release-validator.sh
        env_vars: |
          INPUT_RELEASE_VERSION=${{ inputs.release_version }}
