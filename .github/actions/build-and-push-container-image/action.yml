name: container build-and-push process
description: "Construye la container image"
author: "DevOps Team"

runs:
  using: "composite"
  steps:
    - name: set SCRIPTS_PATH
      shell: bash
      run: |
        SCRIPTS_PATH=".ci-toolkit/.github/scripts"
        echo "SCRIPTS_PATH=${SCRIPTS_PATH}" >> $GITHUB_ENV


    # ── Dependencies ──────────────────────────────────────────

    - name: "Setup Docker Buildx"
      uses: docker/setup-buildx-action@v4

    - name: "Login to GHCR"
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.github_token }}

    - name: "Install Trivy"
      shell: bash
      run: |
        if command -v trivy &>/dev/null; then
          echo "✅ Trivy already installed: $(trivy --version 2>&1 | head -1)"
          exit 0
        fi
        echo "ℹ️  Installing Trivy..."
        curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
          | sudo sh -s -- -b /usr/local/bin
        trivy --version

    - name: "Build Container Image"
      id: build
      shell: bash
      env:
        GITHUB_SHA: ${{ github.sha }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_WORKSPACE: ${{ github.workspace }}
        INPUT_IS_SINGLE_BRANCH_DEPLOYMENT: ${{ inputs.is_single_branch_deployment }}
      run: |
        set -euo pipefail
        SCRIPT="${SCRIPTS_PATH}/shell/container/build-and-push.sh"
        chmod +x "${SCRIPT}"
        "${SCRIPT}" build
