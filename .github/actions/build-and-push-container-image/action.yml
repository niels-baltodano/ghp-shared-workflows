name: container build-and-push process
description: "Builds, scans, and pushes a container image to GHCR"
author: "DevOps Team"

inputs:
  github_token:
    description: "GitHub token for authentication"
    required: true
  trivy_severity:
    description: "Trivy severity threshold"
    required: false
    default: "CRITICAL,HIGH"
  trivy_ignore_unfixed:
    description: "Ignore unfixed vulnerabilities"
    required: false
    default: "true"
  trivy_exit_code:
    description: "Exit code when vulnerabilities found"
    required: false
    default: "1"
  project_language:
    description: "Main programming language of the project, used for Trivy scan reporting"
    required: false
    default: "N/A"
  security_allow_push_to_ghcr:
    description: "Flag to allow pushing the container image to GHCR, used for security control"
    required: false
    default: "false"
  is_single_branch_deployment:
    description: "Flag to indicate if the deployment is for a single branch, used for naming conventions"
    required: false
    default: "false"

outputs:
  container_image_name_ghcr:
    description: "Name of the container image in GHCR"
    value: ${{ steps.build.outputs.container_image_name_ghcr }}
  container_image_digest_ghcr:
    description: "Digest of the container image in GHCR"
    value: ${{ steps.push.outputs.container_image_digest_ghcr }}
  client_repo_sha:
    description: "Commit SHA that triggered the build"
    value: ${{ steps.build.outputs.client_repo_sha }}

runs:
  using: "composite"
  steps:
    - name: Set shared paths
      shell: bash
      run: |
        SCRIPTS_PATH=".ci-toolkit/.github/scripts"
        SCRIPT="${SCRIPTS_PATH}/shell/container/build-and-push.sh"
        chmod +x "${SCRIPT}"
        echo "SCRIPTS_PATH=${SCRIPTS_PATH}" >> $GITHUB_ENV
        echo "BUILD_PUSH_SCRIPT=${SCRIPT}" >> $GITHUB_ENV

    # ── Dependencies ──────────────────────────────────────────

    - name: "Setup Docker Buildx"
      uses: docker/setup-buildx-action@v4

    - name: "Login to GHCR"
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.github_token }}

    - name: "Install Trivy"
      shell: bash
      run: |
        set -euo pipefail

        if command -v trivy &>/dev/null; then
          echo "✅ Trivy already installed: $(trivy --version 2>&1 | head -1)"
          exit 0
        fi

        readonly FALLBACK_SAFE_VERSION="v0.69.3"
        readonly MAX_LOOKBACK=5

        # --- Verificar si una versión tiene advisories en OSV.dev ---
        is_compromised() {
          local version="${1#v}"
          local response
          response="$(curl -fsSL -X POST https://api.osv.dev/v1/query \
            -H 'Content-Type: application/json' \
            -d "{\"package\":{\"name\":\"aquasecurity/trivy\",\"ecosystem\":\"GitHub Actions\"},\"version\":\"${version}\"}" \
            2>/dev/null)" || return 1

          local vuln_count
          vuln_count="$(echo "${response}" | grep -c '"id"' 2>/dev/null)" || vuln_count=0

          [[ "${vuln_count}" -gt 0 ]]
        }

        # --- Resolver latest desde GitHub API ---
        resolve_latest() {
          curl -fsSL https://api.github.com/repos/aquasecurity/trivy/releases/latest \
            | grep -o '"tag_name": *"[^"]*"' \
            | cut -d'"' -f4
        }

        # --- Buscar última versión segura ---
        find_safe_version() {
          local candidate
          candidate="$(resolve_latest)"

          if [[ -z "${candidate}" ]]; then
            echo "⚠️  API no disponible, usando fallback ${FALLBACK_SAFE_VERSION}" >&2
            echo "${FALLBACK_SAFE_VERSION}"
            return 0
          fi

          # Verificar latest y hasta MAX_LOOKBACK releases anteriores
          local releases
          releases="$(curl -fsSL 'https://api.github.com/repos/aquasecurity/trivy/releases?per_page='"${MAX_LOOKBACK}" \
            | grep -o '"tag_name": *"[^"]*"' \
            | cut -d'"' -f4)"

          while IFS= read -r tag; do
            [[ -z "${tag}" ]] && continue
            if ! is_compromised "${tag}"; then
              echo "${tag}"
              return 0
            fi
            echo "🚨 ${tag} tiene advisories en OSV.dev, saltando..." >&2
          done <<< "${releases}"

          echo "⚠️  Ninguna release reciente es segura, usando fallback" >&2
          echo "${FALLBACK_SAFE_VERSION}"
        }

        # --- Instalar ---
        TRIVY_VERSION="$(find_safe_version)"
        VERSION_NUM="${TRIVY_VERSION#v}"

        echo "ℹ️  Installing Trivy ${TRIVY_VERSION}..."
        curl -fsSL "https://github.com/aquasecurity/trivy/releases/download/${TRIVY_VERSION}/trivy_${VERSION_NUM}_Linux-64bit.tar.gz" \
          -o /tmp/trivy.tar.gz

        # Verificar checksum
        curl -fsSL "https://github.com/aquasecurity/trivy/releases/download/${TRIVY_VERSION}/trivy_${VERSION_NUM}_checksums.txt" \
          -o /tmp/trivy_checksums.txt
        EXPECTED_SHA="$(grep "Linux-64bit.tar.gz" /tmp/trivy_checksums.txt | awk '{print $1}')"
        ACTUAL_SHA="$(sha256sum /tmp/trivy.tar.gz | awk '{print $1}')"

        if [[ "${EXPECTED_SHA}" != "${ACTUAL_SHA}" ]]; then
          echo "🚨 Checksum mismatch. Aborting."
          exit 1
        fi
        echo "✅ Checksum verified"

        tar -xzf /tmp/trivy.tar.gz -C /tmp
        sudo mv /tmp/trivy /usr/local/bin/trivy
        chmod +x /usr/local/bin/trivy
        rm -f /tmp/trivy.tar.gz /tmp/trivy_checksums.txt

        trivy --version

    - name: "Build Container Image"
      id: build
      shell: bash
      env:
        INPUT_IS_SINGLE_BRANCH_DEPLOYMENT: ${{ inputs.is_single_branch_deployment }}
      run: |
        set -euo pipefail
        "${BUILD_PUSH_SCRIPT}" build

    # ── Scan (continue-on-error: exports result before failing) ──
    - name: "Trivy Security Scan"
      id: scan
      continue-on-error: true
      shell: bash
      env:
        INPUT_IMAGE_NAME: ${{ steps.build.outputs.container_image_name_ghcr }}
        INPUT_TRIVY_SEVERITY: ${{ inputs.trivy_severity }}
        INPUT_TRIVY_IGNORE_UNFIXED: ${{ inputs.trivy_ignore_unfixed }}
        INPUT_TRIVY_EXIT_CODE: ${{ inputs.trivy_exit_code }}
        INPUT_SECURITY_ALLOW_PUSH_TO_GHCR: ${{ inputs.security_allow_push_to_ghcr }}
      run: |
        set -euo pipefail
        "${BUILD_PUSH_SCRIPT}" scan

    # ── Push (only when scan passed or skipped) ───────────────
    - name: "Push Container Image"
      id: push
      if: >-
        steps.scan.outputs.trivy_scan_result == 'passed' || steps.scan.outputs.trivy_scan_result == 'skipped' ||
        (inputs.security_allow_push_to_ghcr == 'true')
      shell: bash
      env:
        INPUT_IMAGE_NAME: ${{ steps.build.outputs.container_image_name_ghcr }}
        INPUT_IS_SINGLE_BRANCH_DEPLOYMENT: ${{ inputs.is_single_branch_deployment }}
      run: |
        set -euo pipefail
        "${BUILD_PUSH_SCRIPT}" push
