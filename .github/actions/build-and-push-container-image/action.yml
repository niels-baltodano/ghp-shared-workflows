name: container build-and-push process
description: "Builds, scans, and pushes a container image to GHCR."
author: "DevOps Team"

inputs:
  github_token:
    description: "GitHub token for GHCR authentication."
    required: false
    default: ""
  trivy_severity:
    description: "Trivy severity threshold."
    required: false
    default: "CRITICAL,HIGH"
  trivy_ignore_unfixed:
    description: "Ignore unfixed vulnerabilities."
    required: false
    default: "true"
  trivy_exit_code:
    description: "Exit code when vulnerabilities are found."
    required: false
    default: "1"
  project_language:
    description: "Main programming language of the project, used for Trivy scan reporting."
    required: false
    default: "N/A"
  security_allow_push_to_ghcr:
    description: "When true, skips the Trivy gate and pushes regardless of scan result."
    required: false
    default: "false"
  is_single_branch_deployment:
    description: "When true, omits the branch name from the image tag."
    required: false
    default: "false"

outputs:
  container_image_name_ghcr:
    description: "Full GHCR image reference with short SHA tag."
    value: ${{ steps.build.outputs.container_image_name_ghcr }}
  container_image_digest_ghcr:
    description: "Immutable digest of the pushed container image."
    value: ${{ steps.push.outputs.container_image_digest_ghcr }}
  client_repo_sha:
    description: "Commit SHA of the client repo that triggered the build."
    value: ${{ steps.build.outputs.client_repo_sha }}

runs:
  using: "composite"
  steps:

    # ── Dependencies ──────────────────────────────────────────

    - name: "Setup Docker Buildx"
      uses: docker/setup-buildx-action@v4

    - name: "Login to GHCR"
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.github_token }}

    - name: "Install Trivy"
      uses: ./.ci-toolkit/.github/actions/run-script
      with:
        script: tools/trivy.sh

    # ── Build ─────────────────────────────────────────────────

    - name: "Build Container Image"
      id: build
      uses: ./.ci-toolkit/.github/actions/run-script
      with:
        script: container/build-and-push.sh
        args: build
        env_vars: |
          INPUT_IS_SINGLE_BRANCH_DEPLOYMENT=${{ inputs.is_single_branch_deployment }}

    # ── Scan (continue-on-error: exports result before failing) ──

    - name: "Trivy Security Scan"
      id: scan
      continue-on-error: true
      uses: ./.ci-toolkit/.github/actions/run-script
      with:
        script: container/build-and-push.sh
        args: scan
        env_vars: |
          INPUT_IMAGE_NAME=${{ steps.build.outputs.container_image_name_ghcr }}
          INPUT_TRIVY_SEVERITY=${{ inputs.trivy_severity }}
          INPUT_TRIVY_IGNORE_UNFIXED=${{ inputs.trivy_ignore_unfixed }}
          INPUT_TRIVY_EXIT_CODE=${{ inputs.trivy_exit_code }}
          INPUT_SECURITY_ALLOW_PUSH_TO_GHCR=${{ inputs.security_allow_push_to_ghcr }}

    # ── Push (only when scan passed or skipped) ───────────────

    - name: "Push Container Image"
      id: push
      if: >-
        steps.scan.outputs.trivy_scan_result == 'passed' || steps.scan.outputs.trivy_scan_result == 'skipped' ||
        (inputs.security_allow_push_to_ghcr == 'true')
      uses: ./.ci-toolkit/.github/actions/run-script
      with:
        script: container/build-and-push.sh
        args: push
        env_vars: |
          INPUT_IMAGE_NAME=${{ steps.build.outputs.container_image_name_ghcr }}
          INPUT_IS_SINGLE_BRANCH_DEPLOYMENT=${{ inputs.is_single_branch_deployment }}
