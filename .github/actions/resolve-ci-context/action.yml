name: resolve-ci-context
description: "Valida el contexto del repositorio respecto a sus acciones"
author: "DevOps Team"

inputs:
  target_action:
    description: >
      High-level pipeline intent (e.g. container, flutter).
      Optional; defaults are resolved internally.
    required: false

runs:
  using: "composite"
  steps:
    - name: resolve-ci-context
      shell: bash
      env:
        INPUT_TARGET_ACTION: ${{ inputs.target_action }}
      run: |
        set -euo pipefail
        GREEN='\033[0;32m'
        NC='\033[0m' # No Color

        echo -ne "🚀 ${GREEN}[INFO]: RESOLVIENDO CONTEXTO${NC}\n"

        SCRIPTS_PATH=".ci-toolkit/.github/scripts"
        export SCRIPTS_PATH
        echo "SCRIPTS_PATH=${SCRIPTS_PATH}" >> $GITHUB_ENV

        EXECUTE_SCRIPT="${SCRIPTS_PATH}/shell/resolve-ci-context/resolve-ci-context.sh"
        chmod +x ${EXECUTE_SCRIPT}
        ${EXECUTE_SCRIPT}
