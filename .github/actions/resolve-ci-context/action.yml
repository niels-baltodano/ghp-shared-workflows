name: resolve-ci-context
description: >
  Inspects the GitHub event and branch, validates branch policy, detects the
  project type (container / flutter), and resolves the release version.
  Outputs a set of boolean flags consumed by downstream jobs to decide whether
  and how to run.
author: "DevOps Team"

inputs:
  target_action:
    description: "High-level pipeline intent (e.g. container, flutter). Optional; resolved internally when omitted."
    required: false
    default: ""
  github_token:
    description: "GitHub token for authenticated gh CLI calls during context resolution."
    required: false
    default: ""

outputs:
  should_run:
    description: "Master gate — false when the event/branch combo does not meet pipeline entry criteria."
    value: ${{ steps.run.outputs.should_run }}
  is_pr:
    description: "True for pull_request events."
    value: ${{ steps.run.outputs.is_pr }}
  is_push:
    description: "True for push events to main."
    value: ${{ steps.run.outputs.is_push }}
  is_dispatch:
    description: "True for workflow_dispatch events."
    value: ${{ steps.run.outputs.is_dispatch }}
  is_hotfix:
    description: "True when the active branch has a hotfix/ prefix."
    value: ${{ steps.run.outputs.is_hotfix }}
  is_container:
    description: "True when a Dockerfile is detected at repo root."
    value: ${{ steps.run.outputs.is_container }}
  is_flutter:
    description: "True when a pubspec.yaml is detected at repo root."
    value: ${{ steps.run.outputs.is_flutter }}
  release_version:
    description: "Full version string inferred from the branch (e.g. v1.2.3)."
    value: ${{ steps.run.outputs.release_version }}
  release_version_number:
    description: "Numeric part of the version string (e.g. 1.2.3)."
    value: ${{ steps.run.outputs.release_version_number }}
  build_number:
    description: "Flutter build number extracted from the branch version string."
    value: ${{ steps.run.outputs.build_number }}
  active_branch:
    description: "Active branch name relevant to the triggering event."
    value: ${{ steps.run.outputs.active_branch }}

runs:
  using: composite
  steps:
    - id: run
      uses: ./.ci-toolkit/.github/actions/run-script
      with:
        script: resolve-ci-context/resolve-ci-context.sh
        env_vars: |
          INPUT_TARGET_ACTION=${{ inputs.target_action }}
          INPUT_GITHUB_TOKEN=${{ inputs.github_token }}
          GH_TOKEN=${{ inputs.github_token }}
