---
name: GitOps Merge Validator
description: >
  Validates that the source branch is up-to-date with its base and has no
  merge conflicts before a PR is merged or a dispatch is triggered.
  Exits non-zero when the branch is stale or a conflict is detected.
author: "DevOps Team"

inputs:
  github_token:
    description: "GitHub token for authenticated gh CLI calls."
    required: false
    default: ""

outputs:
  branch_freshness_check:
    description: "Result of the freshness check: passed / skipped."
    value: ${{ steps.run.outputs.branch_freshness_check }}

runs:
  using: composite
  steps:
    - id: run
      uses: ./.ci-toolkit/.github/actions/run-script
      with:
        script: gitops/merge-validator/merge-validator.sh
        env_vars: |
          GITHUB_TOKEN=${{ inputs.github_token }}
