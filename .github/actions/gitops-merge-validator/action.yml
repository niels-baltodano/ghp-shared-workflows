---
name: "GitOps Merge Validator"
description: "Valida que el PR que se intenta mergear a main tenga el label deploy-to-prod, para evitar merges accidentales a main sin pasar por release branches"
inputs:
  github_token:
    description: "GitHub token for authentication"
    required: true
outputs:
  branch_freshness_check:
    value: ${{ steps.merge-validator.outputs.branch_freshness_check }}
    description: "Resultado de la validación de frescura de la rama (true/false)"
runs:
  using: "composite"
  steps:
    - name: Set shared paths
      shell: bash
      run: |
        SCRIPTS_PATH=".ci-toolkit/.github/scripts"
        SCRIPT="${SCRIPTS_PATH}/shell/gitops/merge-validator.sh"
        chmod +x "${SCRIPT}"
        echo "SCRIPTS_PATH=${SCRIPTS_PATH}" >> $GITHUB_ENV
        echo "MERGE_VALIDATOR_SCRIPT=${SCRIPT}" >> $GITHUB_ENV

    - name: Validate PR Merge to Main
      id: merge-validator
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        set -euo pipefail
        "${MERGE_VALIDATOR_SCRIPT}"
