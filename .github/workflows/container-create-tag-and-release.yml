---
name: Create Tag and Release for Container

on:
  workflow_call:
    inputs:
      release_version:
        description: "The version of the application to deploy"
        type: string
        required: true
jobs:
  # ------------------------------------------------------------
  # @description  Post-merge step that runs when a release branch is
  #               merged into main. Creates an annotated Git tag at the
  #               merge commit and publishes a GitHub release with a
  #               changelog of commits since the previous tag.
  #               Runs only on push-to-main so the tag always points
  #               to the exact merge commit, never to a release branch tip.
  # ------------------------------------------------------------
  create-tag-and-release:
    runs-on: ubuntu-slim
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Checkout monorepo(workflows and actions)
        uses: actions/checkout@v5
        with:
          repository: niels-baltodano/ghp-shared-workflows
          ref: main
          path: .ci-toolkit
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          persist-credentials: true

      - name: Validate tag pattern and release existence
        id: validate-release
        uses: ./.ci-toolkit/.github/actions/gitops-tag-and-release-creator
        with:
          release_version: ${{ inputs.release_version }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
